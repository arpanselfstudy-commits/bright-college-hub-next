openapi: 3.0.0
info:
  title: Bright College Hub API
  version: 1.0.0
  description: Bright College Hub backend REST API documentation

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        success:
          type: boolean
          example: false
        message:
          type: string
        errorCode:
          type: string
        data:
          nullable: true
          example: null
        details:
          nullable: true

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, USER]
        phoneNumber:
          type: string
          nullable: true
        photo:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthRegister:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AuthLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ForgotPassword:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPassword:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 6

    UpdateProfile:
      type: object
      properties:
        name:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          minLength: 10
        photo:
          type: string

    LoginResponseData:
      type: object
      description: Tokens are set as httpOnly cookies. Only user data is returned in the body.
      properties:
        user:
          $ref: '#/components/schemas/User'

    ContactDetails:
      type: object
      required: [email, phoneNo]
      properties:
        email:
          type: string
          format: email
        phoneNo:
          type: string

    DayTiming:
      type: object
      properties:
        isOpen:
          type: boolean
        opensAt:
          type: string
          nullable: true
        closesAt:
          type: string
          nullable: true

    ShopTiming:
      type: object
      properties:
        monday:
          $ref: '#/components/schemas/DayTiming'
        tuesday:
          $ref: '#/components/schemas/DayTiming'
        wednesday:
          $ref: '#/components/schemas/DayTiming'
        thursday:
          $ref: '#/components/schemas/DayTiming'
        friday:
          $ref: '#/components/schemas/DayTiming'
        saturday:
          $ref: '#/components/schemas/DayTiming'
        sunday:
          $ref: '#/components/schemas/DayTiming'

    Shop:
      type: object
      properties:
        _id:
          type: string
        shopId:
          type: string
        name:
          type: string
        createdBy:
          type: string
        type:
          type: string
        location:
          type: string
        distance:
          type: string
          nullable: true
        photo:
          type: string
          nullable: true
        photos:
          type: array
          items:
            type: string
        poster:
          type: string
          nullable: true
        topItems:
          type: array
          items:
            type: string
        allItems:
          type: array
          items:
            type: string
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
        shopTiming:
          $ref: '#/components/schemas/ShopTiming'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShopsPaginationData:
      type: object
      properties:
        shops:
          type: array
          items:
            $ref: '#/components/schemas/Shop'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Salary:
      type: object
      properties:
        from:
          type: number
          minimum: 0
        to:
          type: number
          minimum: 0

    Job:
      type: object
      properties:
        _id:
          type: string
        jobId:
          type: string
        jobName:
          type: string
        createdBy:
          type: string
        jobProvider:
          type: string
        type:
          type: string
          enum: [part-time, full-time]
        deadline:
          type: string
          format: date-time
        location:
          type: string
        experience:
          type: number
          minimum: 0
        salary:
          $ref: '#/components/schemas/Salary'
        jobDescription:
          type: string
        responsibilities:
          type: array
          items:
            type: string
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JobsPaginationData:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductContactDetails:
      type: object
      required: [phoneNo, email]
      properties:
        phoneNo:
          type: string
        email:
          type: string
          format: email

    ListedProduct:
      type: object
      properties:
        _id:
          type: string
        user:
          $ref: '#/components/schemas/User'
        productName:
          type: string
        images:
          type: array
          items:
            type: string
        category:
          type: string
          enum:
            - ELECTRONICS
            - CLOTHING_FASHION
            - HOME_KITCHEN
            - BEAUTY_PERSONAL_CARE
            - SPORTS_FITNESS
            - BOOKS_STATIONERY
            - TOYS_GAMES
            - AUTOMOTIVE
            - GROCERIES_FOOD
            - HEALTH_WELLNESS
        condition:
          type: string
          enum: [NEW, USED, REFURBISHED]
        price:
          type: string
        isNegotiable:
          type: boolean
        description:
          type: string
        yearUsed:
          type: number
          minimum: 0
        contactDetails:
          $ref: '#/components/schemas/ProductContactDetails'
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListedProductsPaginationData:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ListedProduct'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    PriceRange:
      type: object
      properties:
        from:
          type: number
          minimum: 0
        to:
          type: number
          minimum: 0

    RequestedProduct:
      type: object
      properties:
        _id:
          type: string
        user:
          $ref: '#/components/schemas/User'
        name:
          type: string
        images:
          type: array
          items:
            type: string
          nullable: true
        category:
          type: string
          enum:
            - ELECTRONICS
            - CLOTHING_FASHION
            - HOME_KITCHEN
            - BEAUTY_PERSONAL_CARE
            - SPORTS_FITNESS
            - BOOKS_STATIONERY
            - TOYS_GAMES
            - AUTOMOTIVE
            - GROCERIES_FOOD
            - HEALTH_WELLNESS
        price:
          $ref: '#/components/schemas/PriceRange'
        isNegotiable:
          type: boolean
        description:
          type: string
        contactDetails:
          $ref: '#/components/schemas/ProductContactDetails'
        isFulfilled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RequestedProductsPaginationData:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/RequestedProduct'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Cms:
      type: object
      properties:
        _id:
          type: string
        cmsId:
          type: string
        type:
          type: string
          enum:
            - TERMS_AND_CONDITIONS
            - PRIVACY_POLICY
            - ABOUT_US
            - FAQ
        title:
          type: string
        content:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCms:
      type: object
      required: [type, title, content]
      properties:
        type:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        isActive:
          type: boolean

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
          description: Total number of registered users
        newUsersThisMonth:
          type: integer
          description: Users who joined in the current calendar month
        totalJobs:
          type: integer
          description: Total number of job listings
        totalShops:
          type: integer
          description: Total number of shops
        totalListedProducts:
          type: integer
          description: Total number of listed products in the marketplace
        totalRequestedProducts:
          type: integer
          description: Total number of product requests

paths:
  # ─────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegister'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login — sets accessToken and refreshToken as httpOnly cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogin'
      responses:
        '200':
          description: Login successful. Tokens are set as httpOnly cookies (not in response body).
          headers:
            Set-Cookie:
              description: Sets accessToken and refreshToken as httpOnly cookies
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token — reads refreshToken from httpOnly cookie
      description: No request body needed. The refreshToken is read from the httpOnly cookie set at login.
      responses:
        '200':
          description: Tokens refreshed. New tokens set as httpOnly cookies.
          headers:
            Set-Cookie:
              description: Sets new accessToken and refreshToken cookies
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Invalid or reused token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout — reads refreshToken from httpOnly cookie and clears cookies
      description: No request body needed. The refreshToken is read from the httpOnly cookie and invalidated.
      responses:
        '200':
          description: Logged out successfully. Auth cookies cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
      responses:
        '200':
          description: Reset email sent (token is emailed, not returned in response)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/reset-password/{token}:
    post:
      tags: [Auth]
      summary: Reset password using token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/profile:
    patch:
      tags: [Auth]
      summary: Update authenticated user profile
      security:
        - accessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfile'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────
  # SHOPS
  # ─────────────────────────────────────────
  /api/shops:
    get:
      tags: [Shops]
      summary: Get all shops (paginated, filterable)
      security:
        - accessToken: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
          description: Regex search on name, topItems, allItems
        - name: distance
          in: query
          schema:
            type: string
          description: Exact match on distance field
        - name: openDay
          in: query
          schema:
            type: string
            enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
      responses:
        '200':
          description: List of shops
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShopsPaginationData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Shops]
      summary: Create a new shop (Admin only)
      security:
        - accessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, location, contactDetails, shopTiming]
              properties:
                name:
                  type: string
                  minLength: 1
                type:
                  type: string
                  minLength: 1
                location:
                  type: string
                  minLength: 1
                distance:
                  type: string
                photo:
                  type: string
                photos:
                  type: array
                  items:
                    type: string
                poster:
                  type: string
                topItems:
                  type: array
                  items:
                    type: string
                allItems:
                  type: array
                  items:
                    type: string
                contactDetails:
                  $ref: '#/components/schemas/ContactDetails'
                shopTiming:
                  $ref: '#/components/schemas/ShopTiming'
      responses:
        '201':
          description: Shop created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Shop'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shops/{id}:
    get:
      tags: [Shops]
      summary: Get shop by ID
      security:
        - accessToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shop found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Shop'
        '404':
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Shops]
      summary: Update shop by ID (Admin only)
      security:
        - accessToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                location:
                  type: string
                distance:
                  type: string
                photo:
                  type: string
                photos:
                  type: array
                  items:
                    type: string
                poster:
                  type: string
                topItems:
                  type: array
                  items:
                    type: string
                allItems:
                  type: array
                  items:
                    type: string
                contactDetails:
                  $ref: '#/components/schemas/ContactDetails'
                shopTiming:
                  $ref: '#/components/schemas/ShopTiming'
      responses:
        '200':
          description: Shop updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Shop'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Shops]
      summary: Delete shop by ID (Admin only)
      security:
        - accessToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shop deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /api/jobs:
    get:
      tags: [Jobs]
      summary: Get all jobs (paginated, filterable)
      security:
        - accessToken: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
          description: Regex search on jobName, jobProvider
        - name: jobType
          in: query
          schema:
            type: string
            enum: [part-time, full-time]
        - name: minExperience
          in: query
          schema:
            type: number
        - name: maxExperience
          in: query
          schema:
            type: number
        - name: minSalary
          in: query
          schema:
            type: number
        - name: maxSalary
          in: query
          schema:
            type: number
        - name: deadlineFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: deadlineTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobsPaginationData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Jobs]
      summary: Create a new job (Admin only)
      security:
        - accessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobName, jobProvider, type, deadline, location, experience, salary, jobDescription, responsibilities, contactDetails]
              properties:
                jobName:
                  type: string
                  minLength: 1
                jobProvider:
                  type: string
                  minLength: 1
                type:
                  type: string
                  enum: [part-time, full-time]
                deadline:
                  type: string
                  format: date-time
                location:
                  type: string
                  minLength: 1
                experience:
                  type: number
                  minimum: 0
                salary:
                  $ref: '#/components/schemas/Salary'
                jobDescription:
                  type: string
                  minLength: 1
                responsibilities:
                  type: array
                  items:
                    type: string
                  minItems: 1
                contactDetails:
                  $ref: '#/components/schemas/ContactDetails'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get job by ID
      security:
        - accessToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Jobs]
      summary: Update job by ID (Admin only)
      security:
        - accessToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName:
                  type: string
                jobProvider:
                  type: string
                type:
                  type: string
                  enum: [part-time, full-time]
                deadline:
                  type: string
                  format: date-time
                location:
                  type: string
                experience:
                  type: number
                  minimum: 0
                salary:
                  $ref: '#/components/schemas/Salary'
                jobDescription:
                  type: string
                responsibilities:
                  type: array
                  items:
                    type: string
                contactDetails:
                  $ref: '#/components/schemas/ContactDetails'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
